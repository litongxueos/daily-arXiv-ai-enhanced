name: arXiv-daily-ai-enhanced

on:
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:

# 防止并发冲突：同组 workflow 排队执行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整 git 历史，避免 rebase 问题

    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync

    - name: Run script
      run: |
        source .venv/bin/activate
        export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        export CATEGORIES="${{ vars.CATEGORIES }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"
        export CONCURRENT_REQUESTS="${{ vars.CONCURRENT_REQUESTS }}"
        bash run.sh

    - name: Commit and Push
      run: |
        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"
        git config pull.rebase false  # 使用 merge 策略，更稳定

        git add .

        # 检查是否有变更需要提交
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "update"

        # 推送，失败则拉取合并后重试
        for i in {1..5}; do
          echo "Push attempt $i"

          if git push origin main; then
            echo "Push successful"
            exit 0
          fi

          echo "Push failed, pulling latest changes..."

          # 拉取远程变更，冲突时保留本地生成的文件
          if ! git pull origin main --no-edit -X ours; then
            echo "Pull with merge failed, trying manual resolution..."
            git checkout --ours data/ 2>/dev/null || true
            git add .
            git commit -m "merge: resolve conflicts, keep local generated files"
          fi

          echo "Waiting before retry..."
          sleep $((i * 3))
        done

        echo "Failed to push after 5 attempts"
        exit 1
